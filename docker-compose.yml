# Local development services only — NOT a production deployment.
# Matches the DATABASE_URL / REDIS_URL defaults in .env.example.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: kicks
      POSTGRES_PASSWORD: kicks
      POSTGRES_DB: kicks
    ports:
      - "5432:5432"
    volumes:
      - kicks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kicks"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - kicks_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kicks_pgdata:
  kicks_redisdata:
